>123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br><span class="line">155</span><br><span class="line">156</span><br><span class="line">157</span><br><span class="line">158</span><br><span class="line">159</span><br><span class="line">160</span><br><span class="line">161</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;math/rand&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> Node[E comparable] <span class="keyword">struct</span> &#123;</span><br><span class="line">	elem E</span><br><span class="line">	next *Node[E]</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> List[E comparable] <span class="keyword">struct</span> &#123;</span><br><span class="line">	sentinel Node[E]</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List[E])</span></span> <span class="built_in">print</span>() &#123;</span><br><span class="line">	cur_node := l.sentinel.next</span><br><span class="line">	fmt.Print(<span class="string">&quot;List: &quot;</span>)</span><br><span class="line">	<span class="keyword">for</span> cur_node != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Print(<span class="string">&quot;&quot;</span>, cur_node.elem, <span class="string">&quot;-&gt;&quot;</span>)</span><br><span class="line">		cur_node = cur_node.next</span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Println()</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List[E])</span></span> reverse_every_n_chunk_naive(n <span class="type">int</span>) &#123;</span><br><span class="line">	<span class="keyword">if</span> n &lt;= <span class="number">1</span> &#123;</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// Collect all nodes</span></span><br><span class="line">	nodes := []*Node[E]&#123;&#125;</span><br><span class="line">	&#123;</span><br><span class="line">		cur_node := l.sentinel.next</span><br><span class="line">		<span class="keyword">for</span> cur_node != <span class="literal">nil</span> &#123;</span><br><span class="line">			nodes = <span class="built_in">append</span>(nodes, cur_node)</span><br><span class="line">			cur_node = cur_node.next</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// Chunk by chunk iteration</span></span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i+n &lt;= <span class="built_in">len</span>(nodes); i += n &#123;</span><br><span class="line">		<span class="keyword">for</span> left, right := i, i+n<span class="number">-1</span>; left &lt; right; left, right = left+<span class="number">1</span>, right<span class="number">-1</span> &#123;</span><br><span class="line">			<span class="comment">// Swap</span></span><br><span class="line">			nodes[left], nodes[right] = nodes[right], nodes[left]</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// Rewire the passed in List</span></span><br><span class="line">	prev_node := &amp;l.sentinel</span><br><span class="line">	<span class="keyword">for</span> _, v := <span class="keyword">range</span> nodes &#123;</span><br><span class="line">		prev_node.next = v</span><br><span class="line">		prev_node = v</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// final node</span></span><br><span class="line">	prev_node.next = <span class="literal">nil</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List[E])</span></span> reverse_every_n_chunk(n <span class="type">int</span>) &#123;</span><br><span class="line">	<span class="keyword">if</span> n &lt;= <span class="number">1</span> &#123;</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	prev_chunk_tail := &amp;l.sentinel</span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		chunk_head := prev_chunk_tail.next</span><br><span class="line"></span><br><span class="line">		chunk_tail := chunk_head</span><br><span class="line">		<span class="keyword">for</span> i := <span class="number">1</span>; i &lt; n &amp;&amp; chunk_tail != <span class="literal">nil</span>; i++ &#123;</span><br><span class="line">			chunk_tail = chunk_tail.next</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		<span class="comment">// End of list</span></span><br><span class="line">		<span class="keyword">if</span> chunk_tail == <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="keyword">return</span></span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		prev_node := chunk_tail.next</span><br><span class="line">		cur_node := chunk_head</span><br><span class="line">		<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; n; i++ &#123;</span><br><span class="line">			tmp := cur_node.next</span><br><span class="line">			cur_node.next = prev_node</span><br><span class="line">			prev_node = cur_node</span><br><span class="line">			cur_node = tmp</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		prev_chunk_tail.next = chunk_tail</span><br><span class="line">		prev_chunk_tail = chunk_head</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">is_list_eq</span>[<span class="title">E</span> <span class="title">comparable</span>]<span class="params">(a *List[E], b *List[E])</span></span> <span class="type">bool</span> &#123;</span><br><span class="line">	a_cur := a.sentinel.next</span><br><span class="line">	b_cur := b.sentinel.next</span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		<span class="keyword">if</span> a_cur == <span class="literal">nil</span> &amp;&amp; b_cur == <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">true</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">if</span> a_cur == <span class="literal">nil</span> &amp;&amp; b_cur != <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">if</span> a_cur != <span class="literal">nil</span> &amp;&amp; b_cur == <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">if</span> a_cur.elem != b_cur.elem &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">		&#125;</span><br><span class="line">		a_cur = a_cur.next</span><br><span class="line">		b_cur = b_cur.next</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List[E])</span></span> clone() List[E] &#123;</span><br><span class="line">	result := List[E]&#123;&#125;</span><br><span class="line">	input_cur := l.sentinel.next</span><br><span class="line">	out_cur := &amp;result.sentinel</span><br><span class="line">	<span class="keyword">for</span> input_cur != <span class="literal">nil</span> &#123;</span><br><span class="line">		out_cur.next = &amp;Node[E]&#123;elem: input_cur.elem&#125;</span><br><span class="line">		out_cur = out_cur.next</span><br><span class="line"></span><br><span class="line">		input_cur = input_cur.next</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> result</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">list_from_slice</span>[<span class="title">E</span> <span class="title">comparable</span>]<span class="params">(slice []E)</span></span> List[E] &#123;</span><br><span class="line">	result := List[E]&#123;&#125;</span><br><span class="line">	cur := &amp;result.sentinel</span><br><span class="line">	<span class="keyword">for</span> _, v := <span class="keyword">range</span> slice &#123;</span><br><span class="line">		cur.next = &amp;Node[E]&#123;elem: v&#125;</span><br><span class="line">		cur = cur.next</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> result</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">qcheck</span><span class="params">(loop <span class="type">int</span>)</span></span> &#123;</span><br><span class="line">	<span class="keyword">for</span> <span class="keyword">range</span> loop &#123;</span><br><span class="line">		slice := rand.Perm(<span class="number">200</span>)</span><br><span class="line">		n := rand.Intn(<span class="built_in">len</span>(slice) + <span class="number">2</span>)</span><br><span class="line">		list := list_from_slice(slice)</span><br><span class="line"></span><br><span class="line">		x_list := list.clone()</span><br><span class="line">		y_list := list.clone()</span><br><span class="line"></span><br><span class="line">		x_list.reverse_every_n_chunk_naive(n)</span><br><span class="line">		y_list.reverse_every_n_chunk(n)</span><br><span class="line">		<span class="keyword">if</span> !is_list_eq(&amp;x_list, &amp;y_list) &#123;</span><br><span class="line">			fmt.Println(n)</span><br><span class="line">			list.<span class="built_in">print</span>()</span><br><span class="line">			x_list.<span class="built_in">print</span>()</span><br><span class="line">			y_list.<span class="built_in">print</span>()</span><br><span class="line">			<span class="built_in">panic</span>(<span class="string">&quot;Wrong test&quot;</span>)</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Println(<span class="string">&quot;Loop&quot;</span>, loop, <span class="string">&quot;OK&quot;</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	qcheck(<span class="number">1000</span>)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
