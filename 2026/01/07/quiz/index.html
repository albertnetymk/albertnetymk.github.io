></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;math/rand&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> Node <span class="keyword">struct</span> &#123;</span><br><span class="line">	elem <span class="type">int</span></span><br><span class="line">	next *Node</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> List <span class="keyword">struct</span> &#123;</span><br><span class="line">	sentinel Node</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List)</span></span> <span class="built_in">print</span>() &#123;</span><br><span class="line">	<span class="keyword">var</span> cur_node = l.sentinel.next</span><br><span class="line">	fmt.Print(<span class="string">&quot;List: &quot;</span>)</span><br><span class="line">	<span class="keyword">for</span> cur_node != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Print(<span class="string">&quot;&quot;</span>, cur_node.elem, <span class="string">&quot;-&gt;&quot;</span>)</span><br><span class="line">		cur_node = cur_node.next</span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Println()</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List)</span></span> reverse_every_n_chunk_naive(n <span class="type">int</span>) &#123;</span><br><span class="line">	<span class="keyword">if</span> n &lt;= <span class="number">1</span> &#123;</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">if</span> l.sentinel.next == <span class="literal">nil</span> &#123;</span><br><span class="line">		<span class="comment">// Empty list</span></span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">var</span> num_elems = <span class="number">0</span></span><br><span class="line">	&#123;</span><br><span class="line">		<span class="keyword">var</span> cur_node = l.sentinel.next</span><br><span class="line">		<span class="keyword">for</span> cur_node != <span class="literal">nil</span> &#123;</span><br><span class="line">			num_elems++</span><br><span class="line">			cur_node = cur_node.next</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">var</span> slice = <span class="built_in">make</span>([]<span class="type">int</span>, num_elems)</span><br><span class="line">	&#123;</span><br><span class="line">		<span class="keyword">var</span> cur_node = l.sentinel.next</span><br><span class="line">		<span class="keyword">var</span> i = <span class="number">0</span></span><br><span class="line">		<span class="keyword">for</span> cur_node != <span class="literal">nil</span> &#123;</span><br><span class="line">			slice[i] = cur_node.elem</span><br><span class="line">			cur_node = cur_node.next</span><br><span class="line">			i++</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; i &lt; num_elems; i++ &#123;</span><br><span class="line">		<span class="keyword">if</span> (i+<span class="number">1</span>)%n == <span class="number">0</span> &#123;</span><br><span class="line">			<span class="comment">// reverse the last n elems</span></span><br><span class="line">			<span class="keyword">for</span> j := <span class="number">1</span>; j &lt;= n/<span class="number">2</span>; j++ &#123;</span><br><span class="line">				<span class="comment">// swap pairs, e.g. i-(n-1) and i-0</span></span><br><span class="line">				<span class="keyword">var</span> x = i - (j - <span class="number">1</span>)</span><br><span class="line">				<span class="keyword">var</span> y = i - (n - <span class="number">1</span>) + (j - <span class="number">1</span>)</span><br><span class="line">				slice[x], slice[y] = slice[y], slice[x]</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// Rewire the passed in List</span></span><br><span class="line">	<span class="keyword">var</span> cur_node = &amp;l.sentinel</span><br><span class="line">	<span class="keyword">for</span> _, v := <span class="keyword">range</span> slice &#123;</span><br><span class="line">		cur_node.next = &amp;Node&#123;elem: v&#125;</span><br><span class="line">		cur_node = cur_node.next</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List)</span></span> reverse_every_n_chunk(n <span class="type">int</span>) &#123;</span><br><span class="line">	<span class="keyword">if</span> n &lt;= <span class="number">1</span> &#123;</span><br><span class="line">		<span class="keyword">return</span></span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">var</span> final_node_in_prev_chunk = &amp;l.sentinel</span><br><span class="line"></span><br><span class="line">	<span class="keyword">var</span> cur = l.sentinel.next</span><br><span class="line">	<span class="keyword">for</span> i := <span class="number">0</span>; cur != <span class="literal">nil</span>; i++ &#123;</span><br><span class="line">		<span class="keyword">var</span> next = cur.next</span><br><span class="line">		<span class="keyword">if</span> (i+<span class="number">1</span>)%n == <span class="number">0</span> &#123;</span><br><span class="line">			<span class="comment">// cur is the end of current chunk</span></span><br><span class="line"></span><br><span class="line">			<span class="comment">// Nested loop for nodes inside current chunk</span></span><br><span class="line">			<span class="comment">// [first, cur]</span></span><br><span class="line">			<span class="keyword">var</span> first = final_node_in_prev_chunk.next</span><br><span class="line"></span><br><span class="line">			<span class="comment">// Pretend prev is start of next chunk</span></span><br><span class="line">			<span class="keyword">var</span> prev = next</span><br><span class="line">			<span class="keyword">var</span> nested_cur = first</span><br><span class="line">			<span class="keyword">for</span> j:=<span class="number">1</span>; j&lt;=n; j++ &#123;</span><br><span class="line">				<span class="keyword">var</span> next_node = nested_cur.next</span><br><span class="line">				nested_cur.next = prev</span><br><span class="line"></span><br><span class="line">				<span class="comment">// advance</span></span><br><span class="line">				prev = nested_cur</span><br><span class="line">				nested_cur = next_node</span><br><span class="line">			&#125;</span><br><span class="line"></span><br><span class="line">			<span class="comment">// After reverse: [cur, first]</span></span><br><span class="line">			final_node_in_prev_chunk.next = cur</span><br><span class="line">			final_node_in_prev_chunk = first</span><br><span class="line">		&#125;</span><br><span class="line">		cur = next</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">is_list_eq</span><span class="params">(a *List, b *List)</span></span> <span class="type">bool</span> &#123;</span><br><span class="line">	<span class="keyword">var</span> a_cur = a.sentinel.next</span><br><span class="line">	<span class="keyword">var</span> b_cur = b.sentinel.next</span><br><span class="line">	<span class="keyword">for</span> &#123;</span><br><span class="line">		<span class="keyword">if</span> a_cur == <span class="literal">nil</span> &amp;&amp; b_cur == <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">true</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">if</span> a_cur == <span class="literal">nil</span> &amp;&amp; b_cur != <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">if</span> a_cur != <span class="literal">nil</span> &amp;&amp; b_cur == <span class="literal">nil</span> &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">if</span> a_cur.elem != b_cur.elem &#123;</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span></span><br><span class="line">		&#125;</span><br><span class="line">		a_cur = a_cur.next</span><br><span class="line">		b_cur = b_cur.next</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="params">(l *List)</span></span> clone() List &#123;</span><br><span class="line">	<span class="keyword">var</span> result = List&#123;&#125;</span><br><span class="line">	<span class="keyword">var</span> input_cur = l.sentinel.next</span><br><span class="line">	<span class="keyword">var</span> out_cur = &amp;result.sentinel</span><br><span class="line">	<span class="keyword">for</span> input_cur != <span class="literal">nil</span> &#123;</span><br><span class="line">		out_cur.next = &amp;Node&#123;elem: input_cur.elem&#125;</span><br><span class="line">		out_cur = out_cur.next</span><br><span class="line"></span><br><span class="line">		input_cur = input_cur.next</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> result</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">list_from_slice</span><span class="params">(slice []<span class="type">int</span>)</span></span> List &#123;</span><br><span class="line">	<span class="keyword">var</span> result = List&#123;&#125;</span><br><span class="line">	<span class="keyword">var</span> cur = &amp;result.sentinel</span><br><span class="line">	<span class="keyword">for</span> _, v := <span class="keyword">range</span> slice &#123;</span><br><span class="line">		cur.next = &amp;Node&#123;elem: v&#125;</span><br><span class="line">		cur = cur.next</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">return</span> result</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">qcheck</span><span class="params">(loop <span class="type">int</span>)</span></span> &#123;</span><br><span class="line">	<span class="keyword">for</span> <span class="keyword">range</span> loop &#123;</span><br><span class="line">		<span class="keyword">var</span> slice = <span class="built_in">make</span>([]<span class="type">int</span>, <span class="number">100</span>)</span><br><span class="line">		<span class="keyword">var</span> n = rand.Intn(<span class="built_in">len</span>(slice) + <span class="number">2</span>)</span><br><span class="line">		<span class="keyword">for</span> i := <span class="keyword">range</span> slice &#123;</span><br><span class="line">			slice[i] = i + <span class="number">1</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">var</span> list = list_from_slice(slice)</span><br><span class="line"></span><br><span class="line">		<span class="keyword">var</span> x_list = list.clone()</span><br><span class="line">		<span class="keyword">var</span> y_list = list.clone()</span><br><span class="line"></span><br><span class="line">		x_list.reverse_every_n_chunk_naive(n)</span><br><span class="line">		y_list.reverse_every_n_chunk(n)</span><br><span class="line">		<span class="keyword">if</span> !is_list_eq(&amp;x_list, &amp;y_list) &#123;</span><br><span class="line">			fmt.Println(n)</span><br><span class="line">			list.<span class="built_in">print</span>()</span><br><span class="line">			x_list.<span class="built_in">print</span>()</span><br><span class="line">			y_list.<span class="built_in">print</span>()</span><br><span class="line">			<span class="built_in">panic</span>(<span class="string">&quot;Wrong test&quot;</span>)</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	fmt.Println(<span class="string">&quot;Loop&quot;</span>, loop, <span class="string">&quot;OK&quot;</span>)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	qcheck(<span class="number">1000</span>)</span><br><span class="line">&#125;</span><br></pre></td></tr
